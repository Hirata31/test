<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ガチャゲーム</title>

<style>

body{
font-family:sans-serif;
background:linear-gradient(135deg,#1e3c72,#2a5298);
color:white;
text-align:center;
padding-top:40px;
}

h1{
font-size:40px;
}

button{
font-size:22px;
padding:15px 40px;
border:none;
border-radius:10px;
background:#ffcc00;
cursor:pointer;
margin-top:20px;
}

button:hover{
transform:scale(1.1);
}

#capsule{
width:120px;
height:120px;
margin:30px auto;
border-radius:50%;
background:radial-gradient(circle,#fff,#ff4444);
box-shadow:0 0 20px white;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
}

.spin{
animation:spin 1.2s linear;
}

@keyframes spin{
0%{transform:rotate(0deg) scale(1)}
50%{transform:rotate(360deg) scale(1.2)}
100%{transform:rotate(720deg) scale(1)}
}

.card{
margin:20px auto;
padding:20px;
width:300px;
border-radius:15px;
font-size:26px;
animation:pop 0.4s ease;
}

.common{background:#777;}
.rare{background:#2ecc71;}
.super{background:#3498db;}
.ultra{background:#9b59b6;}
.legend{background:gold;color:black;}

@keyframes pop{
0%{transform:scale(0)}
100%{transform:scale(1)}
}

</style>
</head>

<body>

<h1>🎰 ガチャゲーム 🎰</h1>

<div id="capsule">🎁</div>

<button onclick="drawGacha()">ガチャを引く！</button>

<div id="result"></div>

<script>

const characters=[
{name:"スライム",rarity:1},
{name:"ゴブリン",rarity:1},
{name:"騎士",rarity:2},
{name:"魔法使い",rarity:2},
{name:"ドラゴンナイト",rarity:3},
{name:"精霊王",rarity:3},
{name:"魔王",rarity:4},
{name:"伝説の勇者",rarity:5}
];

function drawGacha(){

document.getElementById("result").innerHTML="";

let capsule=document.getElementById("capsule");

capsule.classList.remove("spin");
void capsule.offsetWidth;
capsule.classList.add("spin");

setTimeout(showResult,1500);
}

function showResult(){

let rand=Math.random()*100;
let rarity;

if(rand<50)rarity=1;
else if(rand<75)rarity=2;
else if(rand<90)rarity=3;
else if(rand<98)rarity=4;
else rarity=5;

let pool=characters.filter(c=>c.rarity===rarity);
let result=pool[Math.floor(Math.random()*pool.length)];

let star="★".repeat(rarity);

let className="";
if(rarity===1)className="common";
if(rarity===2)className="rare";
if(rarity===3)className="super";
if(rarity===4)className="ultra";
if(rarity===5)className="legend";

document.getElementById("result").innerHTML=
`<div class="card ${className}">
${star}<br>${result.name}
</div>`;

}

</script>

</body>
</html>
